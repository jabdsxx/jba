<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تقديم طلبك</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,Arial;
}

body{
margin:0;
background:#080b18;
color:white;
}

.container{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
width:100%;
max-width:640px;
}

.badge{
width:max-content;
margin:auto;
background:#10233a;
border:1px solid #203758;
padding:10px 22px;
border-radius:30px;
font-size:14px;
color:#ddd;
}

.badge span{
color:#6d5cff;
}

h1{
text-align:center;
font-size:42px;
margin:25px 0 8px;
font-weight:800;
}

.subtitle{
text-align:center;
color:#9297aa;
margin-bottom:45px;
}

.form{
background:#101322;
border:1px solid #252a3d;
border-radius:28px;
padding:35px;
}

label{
display:block;
margin-bottom:10px;
color:#ddd;
font-weight:bold;
}

input,select{

width:100%;
height:58px;
background:#111528;
border:1px solid #30364d;
border-radius:15px;
padding:0 18px;
color:white;
font-size:16px;
outline:none;

}

input:focus,select:focus{
border-color:#755cff;
}


button{

width:100%;
height:62px;
margin-top:35px;
border:0;
border-radius:18px;
background:linear-gradient(90deg,#6857f5,#16b7dc);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;

}

.note{

text-align:center;
margin-top:20px;
color:#85899b;
font-size:13px;

}


/* Popup */

.popup{

display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
padding:20px;
z-index:999;

}

.popup-box{

background:#101322;
border:1px solid #30364d;
border-radius:25px;
padding:30px;
text-align:center;
max-width:400px;
width:100%;

}

.popup-box h2{
margin-top:0;
}

.popup-box p{

color:#aaa;
line-height:1.8;

}

.popup-box button{

margin-top:15px;
height:55px;

}

.cancel{

background:#252a3d;

}


@media(max-width:600px){

h1{
font-size:30px;
}

.form{
padding:22px;
}

button{
font-size:18px;
}

}

</style>

</head>


<body>


<div class="container">

<div class="box">


<div class="badge">
<span>●</span> نموذج التقديم
</div>


<h1>
قدّم طلبك في دقيقة واحدة
</h1>


<div class="subtitle">
املأ البيانات التالية وسيتم توجيهك لإكمال التسجيل
</div>



<div class="form">


<label>
الاسم الكامل
</label>

<input type="text" placeholder="مثال: أحمد محمد">



<div style="margin-top:20px;">

<label>
الوظيفة المطلوبة
</label>


<select>

<option>اختر الوظيفة</option>

<option>مهندس مدني</option>
<option>مهندس معماري</option>
<option>مهندس كهرباء</option>
<option>مهندس ميكانيكا</option>
<option>مهندس موقع</option>
<option>مهندس تخطيط</option>

<option>مشرف موقع</option>
<option>مراقب إنشاءات</option>
<option>مساح</option>

<option>فني كهرباء</option>
<option>فني تكييف وتبريد</option>
<option>فني سباكة</option>
<option>فني صيانة</option>

<option>سائق خاص</option>
<option>سائق نقل ثقيل</option>
<option>سائق شاحنة</option>
<option>سائق توصيل</option>

<option>عامل بناء</option>
<option>عامل تشطيبات</option>
<option>نجار</option>
<option>حداد</option>
<option>دهان</option>
<option>عامل نظافة</option>

<option>حارس أمن</option>
<option>موظف استقبال</option>
<option>سكرتير</option>
<option>محاسب</option>
<option>مندوب مبيعات</option>
<option>خدمة عملاء</option>

<option>مبرمج</option>
<option>فني شبكات</option>
<option>دعم تقنية معلومات</option>

<option>طباخ</option>
<option>عامل مطعم</option>
<option>عامل مستودع</option>

</select>

</div>



<div style="margin-top:20px;">

<label>
هل تحتاج نقل كفالة؟
</label>

<select>

<option>اختر</option>
<option>نعم</option>
<option>لا</option>

</select>

</div>



<button onclick="showPopup()">

متابعة التسجيل ←

</button>



<div class="note">

بالضغط على متابعة سيتم توجيهك لإكمال التسجيل

</div>


</div>


</div>

</div>




<div class="popup" id="popup">

<div class="popup-box">


<h2>
تنبيه التسجيل
</h2>


<p>
يرجى إكمال التسجيل بالبيانات المطلوبة حتى يتم التواصل معك بخصوص الطلب.
</p>


<button onclick="goCPA()">

متابعة التسجيل

</button>


<button class="cancel" onclick="closePopup()">

إلغاء

</button>


</div>

</div>




<script>


function showPopup(){

document.getElementById("popup").style.display="flex";

}


function closePopup(){

document.getElementById("popup").style.display="none";

}


function goCPA(){

window.location.href =
"https://app.hawktrk.com/click?pid=2&offer_id=14034&sub2=u494361&sub5=s1SUBID1HERE";

}


</script>


</body>

</html>
